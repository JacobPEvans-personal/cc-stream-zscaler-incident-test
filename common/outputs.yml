# Filesystem stand-ins for the real destinations:
#   prod-router = Output Router used by Key Route 2 (PROD), fanning out to both
#                 real prod destinations, matching the production environment
#   fs-prod     = Splunk prod index (router branch 1)
#   fs-s3       = AWS S3 archive (router branch 2)
#   fs-dev      = dev Splunk index (Key Route 1 dest)
#   fs-default  = default route (events that matched nothing — the "lost" bucket)
outputs:
  prod-router:
    type: router
    rules:
      - filter: "true"
        output: fs-s3
        final: false
      - filter: "true"
        output: fs-prod
        final: true
  fs-prod:
    type: filesystem
    destPath: /tmp/out/prod
    format: json
    maxFileOpenTimeSec: 10
    maxFileIdleTimeSec: 10
    baseFileName: events
  fs-s3:
    type: filesystem
    destPath: /tmp/out/s3
    format: json
    maxFileOpenTimeSec: 10
    maxFileIdleTimeSec: 10
    baseFileName: events
  fs-dev:
    type: filesystem
    destPath: /tmp/out/dev
    format: json
    maxFileOpenTimeSec: 10
    maxFileIdleTimeSec: 10
    baseFileName: events
  fs-default:
    type: filesystem
    destPath: /tmp/out/default
    format: json
    maxFileOpenTimeSec: 10
    maxFileIdleTimeSec: 10
    baseFileName: events
