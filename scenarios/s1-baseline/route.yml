# s1-baseline: PROD only, no dev route. Control: 1000 in, 1000 out to prod untouched.
id: default
groups: {}
routes:
  -
    clones: []
    disabled: false
    id: "decoy-1"
    name: "decoy-1"
    filter: "sourcetype=='decoy-a'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "decoy-2"
    name: "decoy-2"
    filter: "host=='decoy-b'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "prod-route"
    name: "Key Route 2 (PROD)"
    filter: "index=='zscaler' && sourcetype.startsWith('zscalernss-')"
    pipeline: "pack:prod-pack"
    output: "prod-router"
    final: true
  -
    clones: []
    disabled: false
    id: "decoy-3"
    name: "decoy-3"
    filter: "source=='decoy-c'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "default"
    name: "default"
    filter: "true"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
