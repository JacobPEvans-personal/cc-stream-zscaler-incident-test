# s3b-guard-route-filter: Mis-scoped guard: clone==true added to the WG dev route FILTER itself. The field only exists on clones created BY this route, so the filter can never match — dev gets zero events.
id: default
groups: {}
routes:
  -
    clones: []
    disabled: false
    id: "decoy-1"
    name: "decoy-1"
    filter: "sourcetype=='decoy-a'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "decoy-2"
    name: "decoy-2"
    filter: "host=='decoy-b'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: [{"clone":true}]
    disabled: false
    id: "dev-route"
    name: "Key Route 1 (DEV)"
    filter: "index=='zscaler' && sourcetype.startsWith('zscalernss-') && clone==true"
    pipeline: "pack:dev-pack"
    output: "fs-dev"
    final: false
  -
    clones: []
    disabled: false
    id: "prod-route"
    name: "Key Route 2 (PROD)"
    filter: "index=='zscaler' && sourcetype.startsWith('zscalernss-')"
    pipeline: "pack:prod-pack"
    output: "prod-router"
    final: true
  -
    clones: []
    disabled: false
    id: "decoy-3"
    name: "decoy-3"
    filter: "source=='decoy-c'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "default"
    name: "default"
    filter: "true"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
