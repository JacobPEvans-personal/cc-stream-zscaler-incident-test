# s7-dual-dest: PROD dual destination shape (Splunk + S3): two same-filter routes, prod-a Final=off to fs-s3, prod-b Final=on to fs-prod. Both should get all 1000.
id: default
groups: {}
routes:
  -
    clones: []
    disabled: false
    id: "decoy-1"
    name: "decoy-1"
    filter: "sourcetype=='decoy-a'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "decoy-2"
    name: "decoy-2"
    filter: "host=='decoy-b'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "prod-a"
    name: "PROD to S3"
    filter: "index=='zscaler' && sourcetype.startsWith('zscalernss-')"
    pipeline: "pack:prod-pack"
    output: "fs-s3"
    final: false
  -
    clones: []
    disabled: false
    id: "prod-b"
    name: "PROD to Splunk"
    filter: "index=='zscaler' && sourcetype.startsWith('zscalernss-')"
    pipeline: "pack:prod-pack"
    output: "fs-prod"
    final: true
  -
    clones: []
    disabled: false
    id: "decoy-3"
    name: "decoy-3"
    filter: "source=='decoy-c'"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
  -
    clones: []
    disabled: false
    id: "default"
    name: "default"
    filter: "true"
    pipeline: "passthrough"
    output: "fs-default"
    final: true
