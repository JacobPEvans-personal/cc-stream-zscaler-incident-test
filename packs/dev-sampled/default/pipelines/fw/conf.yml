output: default
functions:
  - id: sampling
    filter: "true"
    disabled: false
    conf:
      rules:
        - filter: "true"
          rate: 10
  - id: eval
    filter: "true"
    disabled: false
    description: Overwrite index/sourcetype for the dev Splunk index (end of dev pipeline)
    conf:
      add:
        - name: index
          value: "'zscaler_dev'"
        - name: sourcetype
          value: "sourcetype + ':clone'"
