name: Incident Matrix

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label (use your self-hosted label to inspect Cribl afterward)
        type: string
        default: ubuntu-latest
      hold_minutes:
        description: Keep the last scenario's Cribl instance alive this many minutes after the run (only reachable on a self-hosted runner)
        type: number
        default: 0
  pull_request:
    paths:
      - 'e2e/**'
      - 'common/**'
      - 'packs/**'
      - 'scenarios/**'
      - '.github/workflows/incident-matrix.yml'

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Run all scenarios
        env:
          KEEP: ${{ (inputs.hold_minutes || 0) > 0 && '1' || '' }}
        run: node --experimental-strip-types e2e/run.ts scenarios/*
      - name: Hold Cribl for inspection
        if: (inputs.hold_minutes || 0) > 0
        env:
          HOLD_MINUTES: ${{ inputs.hold_minutes }}
        run: |
          echo "Cribl UI: http://<runner-host>:19000 (admin/admin) for $HOLD_MINUTES minutes"
          sleep $(( HOLD_MINUTES * 60 ))
          docker rm -f cribl-incident
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results
          path: |
            results/*.json
            REPORT.md
      - name: Commit REPORT.md
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add REPORT.md results/
          git diff --cached --quiet || git commit -m "docs: update incident matrix report"
          git push
