name: Incident Matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'e2e/**'
      - 'common/**'
      - 'packs/**'
      - 'scenarios/**'
      - '.github/workflows/incident-matrix.yml'

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run all scenarios
        run: node --experimental-strip-types e2e/run.ts scenarios/*
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            results/*.json
            REPORT.md
      - name: Commit REPORT.md
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add REPORT.md results/
          git diff --cached --quiet || git commit -m "docs: update incident matrix report"
          git push
